naming:
  format: CamelCase ASCII
  acronyms_uppercase:
  - APL
  - COBOL
  - DCC
  - DnD
  - FitD
  - GURPS
  - ML
  - NSR
  - OSR
  - PHP
  - PostScript
  - TTRPG
  - UIUX
  - UX
  - WoD
  exceptions:
    Gaming.TTRPG.MÖRKBORG: Publisher brand styling
    NonFic.Tech.Lang.C++: Programming language name (++ literal)
    NonFic.Tech.Lang.CSharp: C# rendered as CSharp (# breaks tooling)
    NonFic.Tech.Lang.FSharp: F# rendered as FSharp
    NonFic.Tech.Lang.Lisp: Lisp is mixed-case (not LISP)
    Fic.SciFi.HardSF: HardSF is canonical genre acronym
rules:
- id: EVERY_BOOK_TAGGED
  severity: error
  description: Every book must have at least one tag
- id: EVERY_BOOK_PUBLISHER
  severity: error
  description: Every book must have a publisher
- id: EVERY_BOOK_COVER
  severity: error
  description: Every book must have has_cover = 1
- id: EVERY_BOOK_LANGUAGE
  severity: error
  description: Every book must have a language
- id: EVERY_BOOK_COMMENT
  severity: error
  description: Every book must have a comments record
- id: COMMENT_MIN_LENGTH
  severity: warning
  threshold: 100
  description: Comment must be at least 100 chars
- id: NO_SENTINEL_PUBDATE
  severity: error
  description: pubdate must not be 0101-01-01 placeholder
- id: NO_FUTURE_PUBDATE
  severity: error
  description: pubdate must not exceed today
- id: NO_DUPLICATE_ISBN
  severity: error
  description: Each ISBN must appear on at most one book
- id: NO_EMPTY_TAGS
  severity: warning
  description: Every tag should have at least one book
- id: NO_ORPHAN_AUTHORS
  severity: warning
  description: Every author record should be linked to at least one book
- id: TAG_IN_SPEC
  severity: error
  description: Every tag must be listed in the YAML roots tree
- id: PUBDATE_PARSEABLE
  severity: error
  description: pubdate must be a valid ISO date
- id: AUTHOR_NO_TRAILING_WHITESPACE
  severity: warning
  description: Author names must be TRIM()ed
- id: TITLE_NO_TRAILING_WHITESPACE
  severity: warning
  description: Titles must be TRIM()ed
- id: TRANSLATOR_MISSING
  severity: warning
  description: Every Fic.Translated.* book should have a Translator(s) value
- id: READ_NO_DATE
  severity: warning
  description: A book marked Read should carry a Date Read
- id: RATED_NOT_READ
  severity: warning
  description: A rated book should be marked Read or DNF
- id: SINGLETON_SERIES
  severity: warning
  description: A series with only one book contradicts the standalone-leaves-series-empty rule
- id: SOURCE_MISSING
  severity: warning
  description: Every book should carry a Source value
- id: TITLE_NO_CURLY_APOSTROPHE
  severity: warning
  description: Titles should use straight apostrophes, not curly
- id: TITLE_NO_EM_DASH
  severity: warning
  description: Titles should not contain em-dashes
- id: TITLE_NO_THREE_DOT_ELLIPSIS
  severity: warning
  description: Titles should use Unicode ellipsis '…' instead of '...'
- id: AUTHOR_NO_HONORIFIC
  severity: warning
  description: Author names should not carry Dr./Prof./Ph.D/M.D. honorifics
- id: AUTHOR_ORG_AS_AUTHOR
  severity: warning
  description: Organisation-style authors usually overlap publishers; prefer a human credit
- id: AUTHOR_DUPLICATE_SORTKEY
  severity: warning
  description: Multiple authors collapsing to the same sort key are usually one person split
- id: SERIES_INDEX_ZERO
  severity: warning
  description: Prequels should use 0.5 / 0.7 not raw 0
- id: LANG_NOT_ENG_WITHOUT_TAG_HINT
  severity: warning
  description: Non-eng books should sit under Fic.Translated.* or NonFic.Language.*
- id: FORMAT_FICTION_PDF
  severity: warning
  description: Fiction prefers EPUB; flag PDF-only Fic.* books
- id: NO_ORPHAN_CC_LINKS
  severity: error
  description: Custom-column link tables must not retain rows for deleted books
- id: MOBI_ASIN_SHAPE
  severity: warning
  description: mobi-asin values must match the Kindle ASIN pattern B + 9 alnum
- id: AMAZON_IS_ISBN10
  severity: warning
  description: amazon / mobi-asin fields should not hold ISBN-10 values
- id: AUTHOR_NAME_PIPE
  severity: warning
  description: Author names must not contain '|' (Calibre author-separator import bug)
- id: AUTHOR_SORT_ALL_CAPS
  severity: warning
  description: Author sort fields should not be entirely UPPER (Goodreads-export residue)
- id: DATE_READ_NOT_READ
  severity: warning
  description: A book with a Date Read should be marked Read or DNF
