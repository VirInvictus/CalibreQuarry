# CalibreQuarry: example taxonomy (YAML)
#
# This is a real, comprehensive opinionated taxonomy, the spec consumed by the
# library-side linter validate_library.py. It is provided as a ready-to-adapt
# reference for a single-tag-per-book Calibre library (three roots: Fic,
# NonFic, Gaming). Note: the stdlib-only scripts/validate_metadata.py reads the
# JSON form (taxonomy.example.json); this YAML is a richer reference, not parsed
# by the packaged tools. Per-library book ids have been removed.
#
